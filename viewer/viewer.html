<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>enrichr — CRM Data Viewer</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985' }
      }
    }
  }
}
</script>
<style>
  .fade-in { animation: fadeIn 0.2s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  table th { position: sticky; top: 0; z-index: 10; }
  .highlight { background: #fef08a; border-radius: 2px; }
  .dark .highlight { background: #854d0e; color: #fef08a; }
  .truncate-cell { max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  html, header, .ts { transition: background-color 0.2s, border-color 0.2s, color 0.2s; }
  body.resizing { cursor: col-resize !important; user-select: none !important; }
  body.resizing * { cursor: col-resize !important; user-select: none !important; }
</style>









</head>
<body class="h-full bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100">

<div id="app" class="h-full flex flex-col">
  <!-- Header -->
  <header class="ts bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 px-6 py-4 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-3">
      <h1 class="text-xl font-bold tracking-tight">enrichr</h1>
      <span class="text-xs text-gray-400 dark:text-gray-600 font-mono hidden sm:inline">CRM Data Viewer</span>
    </div>
    <div class="flex items-center gap-3">
      <span id="stats" class="text-sm text-gray-500 dark:text-gray-400 hidden sm:inline"></span>
      <button onclick="resetLayout()" title="Reset layout" class="w-9 h-9 flex items-center justify-center rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-base">↺</button>
      <button onclick="toggleTheme()" id="theme-btn" title="Toggle dark mode"
        class="w-9 h-9 flex items-center justify-center rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
        <span id="theme-icon" class="text-base">🌙</span>
      </button>
    </div>
  </header>

  <!-- Tabs + Search -->
  <div class="ts bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 px-6 py-3 flex items-center gap-4 shrink-0 flex-wrap">
    <div class="flex gap-1 shrink-0">
      <button onclick="switchTab('orgs')" id="tab-orgs" class="tab-btn">🏢 Organizations</button>
      <button onclick="switchTab('persons')" id="tab-persons" class="tab-btn">👤 Persons</button>
    </div>
    <div class="flex-1 min-w-[180px] max-w-xl">
      <input id="search" type="text" placeholder="Search… ( / )"
        class="w-full px-4 py-2 text-sm border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-colors"
        oninput="onSearch(this.value)">
    </div>
    <div id="filter-info" class="text-sm text-gray-500 dark:text-gray-400 shrink-0"></div>
  </div>

  <!-- File picker -->
  <div id="file-picker" class="hidden flex-1 flex items-center justify-center p-6">
    <div class="ts bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-lg p-10 max-w-md w-full text-center">
      <div class="text-5xl mb-5">📂</div>
      <h2 class="text-xl font-bold mb-2">Load CSV Data</h2>
      <p class="text-sm text-gray-500 dark:text-gray-400 mb-8">Select your exported orgs.csv and persons.csv files</p>
      <div class="space-y-5 text-left">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Organizations CSV</label>
          <input type="file" id="orgs-file" accept=".csv" class="block w-full text-sm text-gray-500 dark:text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-brand-50 file:text-brand-700 dark:file:bg-brand-800 dark:file:text-brand-200 hover:file:bg-brand-100 dark:hover:file:bg-brand-700 cursor-pointer">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Persons CSV</label>
          <input type="file" id="persons-file" accept=".csv" class="block w-full text-sm text-gray-500 dark:text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-brand-50 file:text-brand-700 dark:file:bg-brand-800 dark:file:text-brand-200 hover:file:bg-brand-100 dark:hover:file:bg-brand-700 cursor-pointer">
        </div>
        <button onclick="onFilesSelected()" class="w-full py-2.5 px-4 bg-brand-600 text-white text-sm font-semibold rounded-lg hover:bg-brand-700 transition-colors shadow-sm">
          Load Data
        </button>
      </div>
    </div>
  </div>

  <!-- Content: split layout -->
  <div id="content" class="flex-1 flex overflow-hidden">
    <!-- Left: table list -->
    <div id="list-pane" class="flex-1 overflow-auto px-6 py-4" style="min-width:33%">
      <div id="table-container" class="ts bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-800 shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
      </div>
      <div id="pagination" class="flex items-center justify-between py-4 text-sm text-gray-500 dark:text-gray-400"></div>
    </div>

    <!-- Resize handle -->
    <div id="resize-handle" class="hidden w-1.5 shrink-0 cursor-col-resize bg-gray-200 dark:bg-gray-700 hover:bg-brand-400 dark:hover:bg-brand-600 active:bg-brand-500 transition-colors" onmousedown="startResize(event)"></div>

    <!-- Right: detail panel (shared for org and person) -->
    <div id="detail-panel" class="hidden shrink-0 overflow-y-auto bg-white dark:bg-gray-900">
      <!-- Sticky header -->
      <div class="px-5 py-4 border-b border-gray-100 dark:border-gray-800 sticky top-0 bg-white dark:bg-gray-900 z-10">
        <div class="flex items-center justify-between">
          <div class="min-w-0">
            <h2 id="detail-title" class="text-base font-bold text-gray-900 dark:text-gray-100 truncate"></h2>
            <div id="detail-subtitle" class="text-gray-500 dark:text-gray-400 text-xs mt-0.5"></div>
          </div>
          <button onclick="closeDetail()" class="ml-3 shrink-0 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 text-lg leading-none transition-colors">✕</button>
        </div>
      </div>
      <!-- Detail content (filled dynamically) -->
      <div id="detail-content"></div>
    </div>
  </div>
</div>

<script>
// --- Theme ---
function getTheme(){return localStorage.getItem('enrichr-theme')||'light'}
function applyTheme(t){document.documentElement.classList.toggle('dark',t==='dark');document.getElementById('theme-icon').textContent=t==='dark'?'☀️':'🌙'}
function toggleTheme(){const t=getTheme()==='dark'?'light':'dark';localStorage.setItem('enrichr-theme',t);applyTheme(t)}
applyTheme(getTheme());

// --- Util ---
function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function clean(v){if(!v||v==='null')return null;let s=String(v).trim();if(s.startsWith('="')&&s.endsWith('"'))s=s.slice(2,-1);else if(s.startsWith('='))s=s.slice(1);return s||null}
function cleanPhone(v){const s=clean(v);if(!s)return null;return s.replace(/[^+0-9]/g,'')}
function resetLayout(){localStorage.removeItem('enrichr-detail-width');detailWidth=Math.round(window.innerWidth*0.4);applyDetailWidth();history.replaceState(null,null,' ')}
const LI_SVG='<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>';
function linkedinLink(v,size){if(!v)return '';const u=v.startsWith('http')?v:'https://'+v;return `<a href="${esc(u)}" target="_blank" title="${esc(v)}" class="inline-flex items-center gap-1.5 text-gray-500 dark:text-gray-400 hover:text-brand-600 dark:hover:text-brand-400 transition-colors">${LI_SVG}<span class="text-xs">LinkedIn</span></a>`}

// --- State ---
let orgs=[],persons=[],currentTab='orgs',searchQuery='',currentPage=1;
let detailWidth=parseInt(localStorage.getItem('enrichr-detail-width'))||Math.round(window.innerWidth*0.4);
const PAGE_SIZE=50;

// --- Resize ---
function applyDetailWidth(){
  const dp=document.getElementById('detail-panel');
  if(dp&&!dp.classList.contains('hidden'))dp.style.width=detailWidth+'px';
}
function startResize(e){
  e.preventDefault();
  document.body.classList.add('resizing');
  const startX=e.clientX,startW=detailWidth;
  function onMove(e){
    const dx=startX-e.clientX;
    const maxW=Math.floor(window.innerWidth*0.66);
    detailWidth=Math.max(300,Math.min(maxW,startW+dx));
    applyDetailWidth();
  }
  function onUp(){
    document.body.classList.remove('resizing');
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onUp);
    localStorage.setItem('enrichr-detail-width',detailWidth);
    // Update URL state with width
    const s=readState();s.dw=detailWidth;pushState(s);
  }
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
}

const ORG_COLS=[
  {key:'org_name',label:'Organization',w:'min-w-[200px]'},
  {key:'_pc',label:'👤',w:'w-12'},
  {key:'website_url',label:'Website',w:'min-w-[160px]',link:true},
  {key:'_location',label:'Location',w:'min-w-[130px]'},
  {key:'industry',label:'Industry',w:'min-w-[140px]'},
  {key:'employee_count_range',label:'Employees',w:'min-w-[100px]'},

  {key:'linkedin_url',label:'LinkedIn',w:'min-w-[140px]',link:true},
  {key:'confidence',label:'Conf.',w:'min-w-[60px]'},
];
const PERSON_COLS=[
  {key:'full_name',label:'Name',w:'min-w-[160px]'},
  {key:'position',label:'Position',w:'min-w-[180px]'},
  {key:'role_category',label:'Role',w:'min-w-[140px]'},
  {key:'is_decision_maker',label:'DM',w:'min-w-[50px]',badge:true},
  {key:'website_url',label:'Organization',w:'min-w-[160px]',orgLink:true},

  {key:'linkedin_url',label:'LinkedIn',w:'min-w-[140px]',link:true},
  {key:'confidence',label:'Conf.',w:'min-w-[60px]'},
];

// --- CSV ---
function parseCsv(text){
  // Strip BOM (both Unicode \uFEFF and UTF-8 bytes ï»¿ from atob)
  const lines=text.replace(/^\uFEFF/,'').replace(/^\xEF\xBB\xBF/,'').replace(/^ï»¿/,'').split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)return [];
  const sep=lines[0].includes(';')?';':',';
  const hdr=parseLine(lines[0],sep);
  return lines.slice(1).map(line=>{
    const vals=parseLine(line,sep);const obj={};
    hdr.forEach((h,i)=>{obj[h.trim()]=clean(vals[i]);});
    return obj;
  });
}
function parseLine(line,sep){
  const f=[];let c='',q=false;
  for(let i=0;i<line.length;i++){const ch=line[i];if(q){if(ch==='"'&&line[i+1]==='"'){c+='"';i++}else if(ch==='"')q=false;else c+=ch}else if(ch==='"')q=true;else if(ch===sep){f.push(c);c=''}else if(ch!=='\r')c+=ch}
  f.push(c);return f;
}

// --- Data Loading ---
async function loadData(){
  if(typeof EMBEDDED_ORGS_CSV!=='undefined'&&typeof EMBEDDED_PERSONS_CSV!=='undefined'){applyData(EMBEDDED_ORGS_CSV,EMBEDDED_PERSONS_CSV);return}
  // Try multiple paths (works from project root or .work/)
  for(const base of ['.work/data_out/','data_out/','']){
    try{const[o,p]=await Promise.all([fetch(base+'orgs.csv').then(r=>{if(!r.ok)throw 0;return r.text()}),fetch(base+'persons.csv').then(r=>{if(!r.ok)throw 0;return r.text()})]);applyData(o,p);return}catch{}
  }
  showFilePicker();
}
function applyData(o,p){
  orgs=parseCsv(o);persons=parseCsv(p);
  orgs.forEach(o=>{
    o._pc=persons.filter(p=>p.website_url===o.website_url).length;
    // Extract PLZ + city from address like "Straße 1, 2100 Korneuburg, Österreich"
    if(o.address){const m=o.address.match(/(\d{4,5})\s+([^,]+)/);o._location=m?`${m[1]} ${m[2]}`:null}
  });
  document.getElementById('stats').textContent=`${orgs.length} orgs · ${persons.length} persons`;
  document.getElementById('file-picker').classList.add('hidden');
  document.getElementById('content').classList.remove('hidden');
  // Restore state from URL or render default
  if(location.hash)restoreState();else render();
}
function showFilePicker(){document.getElementById('file-picker').classList.remove('hidden');document.getElementById('content').classList.add('hidden')}
function onFilesSelected(){const a=document.getElementById('orgs-file').files[0],b=document.getElementById('persons-file').files[0];if(!a||!b)return;Promise.all([a.text(),b.text()]).then(([o,p])=>applyData(o,p))}

// --- URL State ---
function pushState(params){
  const h='#'+Object.entries(params).filter(([,v])=>v!=null&&v!=='').map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
  if(location.hash!==h)history.pushState(null,null,h);
}
function readState(){
  const h=location.hash.slice(1);if(!h)return {};
  return Object.fromEntries(h.split('&').map(p=>{const[k,v]=p.split('=');return[k,decodeURIComponent(v||'')]}));
}
function restoreState(){
  const s=readState();
  if(s.tab&&s.tab!==currentTab){currentTab=s.tab;currentPage=1;searchQuery='';document.getElementById('search').value=''}
  if(s.q){searchQuery=s.q.toLowerCase();document.getElementById('search').value=s.q}
  if(s.page)currentPage=parseInt(s.page)||1;
  if(s.dw){detailWidth=parseInt(s.dw)||680;localStorage.setItem('enrichr-detail-width',detailWidth)}
  render();
  if(s.org)showOrgDetail(s.org,true);
  else if(s.person&&s.site)showPersonDetailByKey(s.person,s.site,true);
  else closeDetail(true);
}
window.addEventListener('popstate',()=>{if(orgs.length)restoreState()});

// --- Tabs / Search ---
function switchTab(t){currentTab=t;currentPage=1;searchQuery='';document.getElementById('search').value='';closeDetail(true);render();pushState({tab:t})}
function onSearch(q){searchQuery=q.toLowerCase();currentPage=1;render();pushState({tab:currentTab,q:q||undefined})}
function getFiltered(){const d=currentTab==='orgs'?orgs:persons;if(!searchQuery)return d;return d.filter(r=>Object.values(r).some(v=>v&&String(v).toLowerCase().includes(searchQuery)))}

// --- Table Render ---
function render(){
  ['orgs','persons'].forEach(t=>{
    document.getElementById('tab-'+t).className=t===currentTab
      ?'px-4 py-2 text-sm font-semibold rounded-lg bg-brand-50 text-brand-700 dark:bg-brand-800/30 dark:text-brand-200 transition-colors'
      :'px-4 py-2 text-sm font-medium rounded-lg text-gray-500 hover:text-gray-700 hover:bg-gray-100 dark:text-gray-400 dark:hover:text-gray-200 dark:hover:bg-gray-800 transition-colors';
  });
  const cols=currentTab==='orgs'?ORG_COLS:PERSON_COLS;
  const fd=getFiltered(),tp=Math.ceil(fd.length/PAGE_SIZE),st=(currentPage-1)*PAGE_SIZE,pg=fd.slice(st,st+PAGE_SIZE);
  const th='px-4 py-3 font-semibold text-xs uppercase tracking-wider bg-gray-50 dark:bg-gray-800/80 text-gray-500 dark:text-gray-400';
  document.getElementById('table-head').innerHTML='<tr>'+(currentTab==='orgs'?`<th class="${th} w-12">#</th>`:'')+cols.map(c=>`<th class="${th} ${c.w||''}">${c.label}</th>`).join('')+'</tr>';
  const tb=document.getElementById('table-body');
  if(!pg.length){tb.innerHTML=`<tr><td colspan="${cols.length+1}" class="px-6 py-16 text-center text-gray-400 dark:text-gray-600">No results</td></tr>`}
  else{tb.innerHTML=pg.map((row,i)=>{
    const cls='cursor-pointer hover:bg-brand-50/50 dark:hover:bg-brand-900/10';
    const orgKey=row.website_url||row.org_name||'';
    const oc=currentTab==='orgs'?`onclick="showOrgDetail('${esc(orgKey)}')"`:`onclick="showPersonDetail(${st+i})"`;
    return `<tr class="${cls} transition-colors border-b border-gray-100 dark:border-gray-800/50" ${oc}>`+(currentTab==='orgs'?`<td class="px-4 py-3 text-gray-400 dark:text-gray-600 text-xs font-mono">${st+i+1}</td>`:'')+cols.map(c=>`<td class="px-4 py-3 ${c.w||''} truncate-cell" title="${esc(row[c.key])}">${fc(row[c.key],c,row)}</td>`).join('')+'</tr>'
  }).join('')}
  document.getElementById('filter-info').textContent=searchQuery?`${fd.length} of ${(currentTab==='orgs'?orgs:persons).length}`:'';
  const pa=document.getElementById('pagination');
  if(tp<=1){pa.innerHTML=`<span>${fd.length} results</span><span></span>`}
  else{const bc='px-3 py-1.5 rounded-lg border border-gray-300 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-800 disabled:opacity-30 disabled:cursor-not-allowed text-sm transition-colors';
    pa.innerHTML=`<span>Page ${currentPage} of ${tp} · ${fd.length} results</span><div class="flex gap-2"><button onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''} class="${bc}">← Prev</button><button onclick="goPage(${currentPage+1})" ${currentPage>=tp?'disabled':''} class="${bc}">Next →</button></div>`}
}
function goPage(p){const t=Math.ceil(getFiltered().length/PAGE_SIZE);if(p>=1&&p<=t){currentPage=p;render()}}

function fc(v,col,row){
  if(!v||v==='null')return '<span class="text-gray-300 dark:text-gray-700">—</span>';
  if(col.badge){
    if(v==='true'||v===true)return '<span class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-400 text-xs font-bold">✓</span>';
    if(v==='false'||v===false)return '<span class="text-gray-300 dark:text-gray-700">—</span>';
    return '<span class="text-gray-400">?</span>';
  }
  if(col.key==='confidence'){const n=parseFloat(v);if(isNaN(n))return esc(v);const c=n>=0.8?'bg-green-400 dark:bg-green-500':n>=0.5?'bg-yellow-400 dark:bg-yellow-500':'bg-red-400 dark:bg-red-500';return `<div class="flex items-center gap-2"><div class="w-14 h-1.5 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden"><div class="${c} h-full rounded-full" style="width:${n*100}%"></div></div><span class="text-xs text-gray-400">${n.toFixed(1)}</span></div>`}
  if(col.key==='org_name'&&currentTab==='orgs'){return `<span class="font-semibold">${esc(v)}</span>`}
  if(col.key==='_pc'){return v>0?`<span class="inline-flex items-center justify-center min-w-[24px] h-6 px-1.5 rounded-full text-xs font-semibold bg-brand-100 text-brand-700 dark:bg-brand-800/40 dark:text-brand-200">${v}</span>`:'<span class="text-gray-300 dark:text-gray-700">—</span>'}
  if(col.orgLink&&v){const o=orgs.find(o=>o.website_url===v);return `<a href="#" onclick="event.preventDefault();showOrgFromPersons('${esc(v)}')" class="text-brand-600 dark:text-brand-400 hover:underline font-medium">${esc(o?o.org_name:v.replace(/^www\./,''))}</a>`}
  if(col.link&&v){const u=v.startsWith('http')?v:'https://'+v;
    if(col.key==='linkedin_url')return linkedinLink(v);
    return `<a href="${esc(u)}" target="_blank" class="text-brand-600 dark:text-brand-400 hover:underline">${esc(v.replace(/^https?:\/\//,'').replace(/^www\./,''))}</a>`}
  if(searchQuery&&String(v).toLowerCase().includes(searchQuery)){return String(v).replace(new RegExp(`(${searchQuery.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<span class="highlight">$1</span>')}
  return esc(String(v));
}

// --- Org Detail ---
function showOrgDetail(key,noHistory){
  const org=orgs.find(o=>(o.website_url||o.org_name)===key);if(!org)return;
  const url=org.website_url;
  if(!noHistory)pushState({tab:currentTab,org:key});
  document.getElementById('detail-title').textContent=org.org_name||url;
  const subtitle=[org.industry,org.legal_form,org.employee_count_range?org.employee_count_range+' employees':null].filter(Boolean).join(' · ');
  document.getElementById('detail-subtitle').textContent=subtitle;

  const fields=[
    {l:'Website',v:org.website_url,link:true},{l:'Address',v:org.address},
    {l:'UID',v:org.uid},{l:'FN',v:org.registry_number},
    {l:'Phone',v:cleanPhone(org.phone),phone:true},{l:'Email',v:org.email,email:true},
    {l:'LinkedIn',v:org.linkedin_url,linkedin:true},{l:'Label',v:org.label},
  ];
  // Render into detail-content
  let html='<div class="grid grid-cols-2 gap-x-4 gap-y-3 px-5 py-4 border-b border-gray-100 dark:border-gray-800 text-sm">';
  html+=fields.filter(f=>f.v).map(f=>{
    let val=esc(f.v);
    if(f.link){const u=f.v.startsWith('http')?f.v:'https://'+f.v;val=`<a href="${esc(u)}" target="_blank" class="text-brand-600 dark:text-brand-400 hover:underline">${val}</a>`}
    if(f.email)val=`<a href="mailto:${esc(f.v)}" class="text-brand-600 dark:text-brand-400 hover:underline">${val}</a>`;
    if(f.phone)val=`<a href="tel:${esc(f.v)}" class="text-brand-600 dark:text-brand-400 hover:underline">${val}</a>`;
    if(f.linkedin)val=linkedinLink(f.v);
    return `<div><div class="text-[11px] text-gray-400 dark:text-gray-500 uppercase tracking-wider font-medium">${f.l}</div><div class="mt-1 font-medium text-sm">${val}</div></div>`;
  }).join('');
  html+='</div>';

  // Persons - split into decision makers and others
  const linked=persons.filter(p=>p.website_url===url);
  const dms=linked.filter(p=>p.is_decision_maker==='true');
  const others=linked.filter(p=>p.is_decision_maker!=='true');
  const countText=linked.length?`${linked.length} person${linked.length>1?'s':''}`:'';

  html+=`<div class="px-5 py-4"><div class="flex items-center justify-between mb-3"><h3 class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide">Persons</h3><span class="text-xs text-gray-400 dark:text-gray-500">${countText}</span></div>`;
  if(!linked.length){html+='<p class="text-gray-400 dark:text-gray-500 text-sm py-4">No persons found for this organization</p>';
  }else{
    if(dms.length){
      html+=`<div class="mb-4"><div class="flex items-center gap-2 mb-3"><span class="w-2 h-2 rounded-full bg-green-500"></span><span class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Decision Makers</span></div>`;
      html+=`<div class="space-y-2">${dms.map(p=>personCard(p,true)).join('')}</div></div>`;
    }
    if(others.length){
      html+=`<div><div class="flex items-center gap-2 mb-3"><span class="w-2 h-2 rounded-full bg-gray-400 dark:bg-gray-600"></span><span class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Other Contacts</span></div>`;
      html+=`<div class="space-y-2">${others.map(p=>personCard(p,false)).join('')}</div></div>`;
    }
  }
  html+='</div>';
  document.getElementById('detail-content').innerHTML=html;
  openDetailPanel();
}

// --- Person Detail ---
function showPersonDetailByKey(name,site,noHistory){
  const p=persons.find(x=>x.full_name===name&&x.website_url===site);
  if(!p)return;
  _showPersonDetail(p,noHistory);
}
function showPersonDetail(idx){
  const fd=getFiltered();
  const p=fd[idx];if(!p)return;
  _showPersonDetail(p);
}
function _showPersonDetail(p,noHistory){
  const org=orgs.find(o=>o.website_url===p.website_url);
  const initials=((p.first_name||'')[0]||'')+((p.last_name||'')[0]||'');
  const dm=p.is_decision_maker==='true';
  const title=[p.title_prefix,p.title_suffix].filter(t=>t).join(' · ');

  if(!noHistory)pushState({tab:currentTab,person:p.full_name,site:p.website_url});
  document.getElementById('detail-title').textContent=p.full_name||'Unknown';
  document.getElementById('detail-subtitle').textContent=[p.position,org?org.org_name:p.website_url].filter(Boolean).join(' · ');

  const fields=[
    {l:'Salutation',v:p.salutation},
    {l:'Title (prefix)',v:p.title_prefix},
    {l:'Title (suffix)',v:p.title_suffix},
    {l:'Position',v:p.position},
    {l:'Role Category',v:p.role_category},
    {l:'Decision Maker',v:dm?'✓ Yes':p.is_decision_maker==='false'?'No':null},
    {l:'Department',v:p.department},
    {l:'Additional Roles',v:p.additional_roles},
    {l:'Email',v:p.email,email:true},
    {l:'Mobile',v:cleanPhone(p.phone_mobile),phone:true},
    {l:'Office',v:cleanPhone(p.phone_office),phone:true},
    {l:'LinkedIn',v:p.linkedin_url,linkedin:true},
    {l:'Website',v:p.website_url,weblink:true},
    {l:'Source Page',v:p.source_page,link:true},
    {l:'Label',v:p.label},
    {l:'Confidence',v:p.confidence},
  ];

  let html='<div class="grid grid-cols-2 gap-x-4 gap-y-3 px-5 py-4 border-b border-gray-100 dark:border-gray-800 text-sm">';
  html+=fields.filter(f=>f.v).map(f=>{
    let val=esc(f.v);
    if(f.link){const u=f.v.startsWith('http')?f.v:'https://'+f.v;val=`<a href="${esc(u)}" target="_blank" class="text-brand-600 dark:text-brand-400 hover:underline">${val}</a>`}
    if(f.email)val=`<a href="mailto:${esc(f.v)}" class="text-brand-600 dark:text-brand-400 hover:underline">${val}</a>`;
    if(f.phone)val=`<a href="tel:${esc(f.v)}" class="text-brand-600 dark:text-brand-400 hover:underline">${val}</a>`;
    if(f.weblink){const u=f.v.startsWith('http')?f.v:'https://'+f.v;val=`<a href="${esc(u)}" target="_blank" class="text-brand-600 dark:text-brand-400 hover:underline">${esc(f.v.replace(/^https?:\/\//,''))}</a>`}
    if(f.linkedin)val=linkedinLink(f.v);
    return `<div><div class="text-[11px] text-gray-400 dark:text-gray-500 uppercase tracking-wider font-medium">${f.l}</div><div class="mt-1 font-medium text-sm">${val}</div></div>`;
  }).join('');
  html+='</div>';

  // Link to organization
  if(org){
    html+=`<div class="px-5 py-4 border-b border-gray-100 dark:border-gray-800"><div class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-2">Organization</div>`;
    html+=`<a href="#" onclick="event.preventDefault();showOrgDetail('${esc(org.website_url||org.org_name)}')" class="inline-flex items-center gap-2 text-sm font-medium text-brand-600 dark:text-brand-400 hover:underline">🏢 ${esc(org.org_name)}</a>`;
    if(org.industry)html+=`<span class="ml-2 text-xs text-gray-400 dark:text-gray-500">${esc(org.industry)}</span>`;
    html+=`</div>`;
  }

  document.getElementById('detail-content').innerHTML=html;
  openDetailPanel();
}

function personCard(p, isDm){
  const initials=((p.first_name||'')[0]||'')+((p.last_name||'')[0]||'');
  const border=isDm?'border-green-200 dark:border-green-800/60':'border-gray-200 dark:border-gray-800';
  const avatarBg=isDm?'bg-green-500 dark:bg-green-600 text-white':'bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300';
  const title=[p.title_prefix,p.title_suffix].filter(t=>t).join(' · ');
  const phone=cleanPhone(p.phone_mobile)||cleanPhone(p.phone_office);
  const phoneLabel=cleanPhone(p.phone_mobile)?'Mobile':'Office';

  // Contact row items
  const contacts=[];
  if(p.email)contacts.push(`<a href="mailto:${esc(p.email)}" class="inline-flex items-center gap-1.5 text-xs text-gray-600 dark:text-gray-300 hover:text-brand-600 dark:hover:text-brand-400 transition-colors"><svg class="w-3.5 h-3.5 text-gray-400 dark:text-gray-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg><span class="truncate">${esc(p.email)}</span></a>`);
  if(phone)contacts.push(`<a href="tel:${esc(phone)}" class="inline-flex items-center gap-1.5 text-xs text-gray-600 dark:text-gray-300 hover:text-brand-600 dark:hover:text-brand-400 transition-colors"><svg class="w-3.5 h-3.5 text-gray-400 dark:text-gray-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg><span>${esc(phone)}</span></a>`);
  if(p.linkedin_url)contacts.push(`<a href="https://${esc(p.linkedin_url)}" target="_blank" class="inline-flex items-center gap-1.5 text-xs text-gray-600 dark:text-gray-300 hover:text-brand-600 dark:hover:text-brand-400 transition-colors"><svg class="w-3.5 h-3.5 text-gray-400 dark:text-gray-500 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg><span class="truncate">${esc(p.linkedin_url.replace('www.linkedin.com/in/',''))}</span></a>`);
  if(p.source_page)contacts.push(`<a href="${esc(p.source_page)}" target="_blank" class="inline-flex items-center gap-1.5 text-xs text-gray-600 dark:text-gray-300 hover:text-brand-600 dark:hover:text-brand-400 transition-colors"><svg class="w-3.5 h-3.5 text-gray-400 dark:text-gray-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg><span class="truncate">Source page</span></a>`);

  const roleBadge=p.role_category?`<span class="text-[11px] px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-500 dark:text-gray-400 font-medium">${esc(p.role_category)}</span>`:'';
  const deptBadge=p.department?`<span class="text-[11px] px-2 py-0.5 rounded-full bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 font-medium">${esc(p.department)}</span>`:'';

  const clickAttr=`onclick="showPersonDetailByKey('${esc(p.full_name)}','${esc(p.website_url)}')" style="cursor:pointer"`;
  return `<div class="rounded-xl border ${border} bg-white dark:bg-gray-900/60 hover:shadow-md transition-all duration-200 overflow-hidden" ${clickAttr}>
    <div class="p-4">
      <div class="flex items-start gap-3">
        <div class="shrink-0 w-10 h-10 rounded-full ${avatarBg} flex items-center justify-center text-xs font-bold shadow-sm">${esc(initials)}</div>
        <div class="min-w-0 flex-1">
          <div class="font-semibold text-sm leading-tight">${esc(p.full_name||'')}</div>
          ${title?`<div class="text-[11px] text-gray-400 dark:text-gray-500 mt-0.5">${esc(title)}</div>`:''}
          ${p.position?`<div class="text-xs text-gray-600 dark:text-gray-300 mt-1 leading-snug">${esc(p.position)}</div>`:''}
          ${roleBadge||deptBadge?`<div class="flex flex-wrap gap-1.5 mt-2">${roleBadge}${deptBadge}</div>`:''}
        </div>
      </div>
    </div>
    ${contacts.length?`<div class="px-4 py-3 bg-gray-50 dark:bg-gray-800/40 border-t border-gray-100 dark:border-gray-800/60 space-y-2">${contacts.join('')}</div>`:''}
  </div>`;
}

function showOrgFromPersons(url){currentTab='orgs';currentPage=1;searchQuery='';document.getElementById('search').value='';render();showOrgDetail(url)}
function openDetailPanel(){
  document.getElementById('detail-panel').classList.remove('hidden');
  document.getElementById('resize-handle').classList.remove('hidden');
  applyDetailWidth();
  document.getElementById('detail-panel').scrollTop=0;
}
function closeDetail(noHistory){
  document.getElementById('detail-panel').classList.add('hidden');
  document.getElementById('resize-handle').classList.add('hidden');
  if(!noHistory)pushState({tab:currentTab,q:searchQuery||undefined});
}

// --- Keyboard ---
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail();if(e.key==='/'&&!['INPUT','TEXTAREA'].includes(document.activeElement.tagName)){e.preventDefault();document.getElementById('search').focus()}});

// --- Init ---
loadData();
</script>
